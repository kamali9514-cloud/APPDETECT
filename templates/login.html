{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Login</h2>

    <form action="{{ url_for('login') }}" method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
